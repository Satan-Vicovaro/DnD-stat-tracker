<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet</title>
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Eel JS bridge -->
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen p-8 flex justify-center items-start font-sans selection:bg-indigo-500/30">

    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700 relative overflow-hidden">
        <!-- Decorative background glow -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-600 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

        <h1 class="text-3xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-1" id="char-name">
            Loading...
        </h1>
        <p class="text-center text-gray-400 font-medium mb-8 tracking-wide">Level <span id="char-level">-</span></p>

        <!-- Derived Stats Grid -->
        <div class="grid grid-cols-2 gap-4 mb-8 relative z-10">
            <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Health Points</p>
                <p class="text-2xl font-bold text-emerald-400" id="char-hp">-</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Defense</p>
                <p class="text-2xl font-bold text-blue-400" id="char-def">-</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Action Points</p>
                <p class="text-2xl font-bold text-amber-400" id="char-ap">-</p>
            </div>
            <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Stamina</p>
                <p class="text-2xl font-bold text-rose-400" id="char-stam">-</p>
            </div>
        </div>

        <!-- Base Stats -->
        <div class="relative z-10">
            <h2 class="text-lg font-bold text-gray-300 mb-4 uppercase tracking-widest border-b border-gray-700/50 pb-2">Base Stats</h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
                    <span class="text-gray-400 font-medium">Strength (STR)</span>
                    <span class="font-bold text-indigo-300 text-lg" id="stat-str">-</span>
                </div>
                <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
                    <span class="text-gray-400 font-medium">Dexterity (DEX)</span>
                    <span class="font-bold text-indigo-300 text-lg" id="stat-dex">-</span>
                </div>
                <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
                    <span class="text-gray-400 font-medium">Wisdom (WIS)</span>
                    <span class="font-bold text-indigo-300 text-lg" id="stat-wis">-</span>
                </div>
                <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
                    <span class="text-gray-400 font-medium">Charisma (CHA)</span>
                    <span class="font-bold text-indigo-300 text-lg" id="stat-cha">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript logic to load data from Python -->
    <script>
        async function loadCharacterData() {
            // Wait for Python to return the dictionary
            let char = await eel.get_character()();
            
            // Populate the UI with data
            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-level').innerText = char.level;
            
            // Format numbers to 1 decimal place if they are floats
            document.getElementById('char-hp').innerText = `${char.hp} / ${char.max_hp}`;
            document.getElementById('char-def').innerText = Number.isInteger(char.defense) ? char.defense : char.defense.toFixed(1);
            document.getElementById('char-ap').innerText = Number.isInteger(char.ap) ? char.ap : char.ap.toFixed(1);
            document.getElementById('char-stam').innerText = Number.isInteger(char.stamina) ? char.stamina : char.stamina.toFixed(1);
            
            document.getElementById('stat-str').innerText = char.stats.str;
            document.getElementById('stat-dex').innerText = char.stats.dex;
            document.getElementById('stat-wis').innerText = char.stats.wis;
            document.getElementById('stat-cha').innerText = char.stats.cha;
        }

        // Run this when the page loads
        window.onload = loadCharacterData;
    </script>
</body>
</html>
