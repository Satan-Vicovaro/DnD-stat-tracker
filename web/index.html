<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Dashboard</title>
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Eel JS bridge -->
    <script type="text/javascript" src="/eel.js"></script>
  </head>
  <body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans selection:bg-indigo-500/30">

    <!-- ─── Toolbar ─────────────────────────────────────────────────── -->
    <div class="sticky top-0 z-50 mb-6 max-w-7xl mx-auto">
      <div class="bg-gray-800/80 backdrop-blur border border-gray-700 rounded-xl px-4 py-2.5 flex items-center gap-3 shadow-lg">

        <!-- Undo button -->
        <button
          id="btn-undo"
          disabled
          title="Cofnij ostatnią akcję (Ctrl+Z)"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-semibold
                 bg-gray-700 text-gray-500 border border-gray-600
                 transition-all duration-150 select-none cursor-not-allowed
                 enabled:cursor-pointer enabled:text-indigo-300 enabled:border-indigo-500/50
                 enabled:bg-indigo-900/40 enabled:hover:bg-indigo-800/60 enabled:hover:text-white
                 active:scale-95"
        >
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"/>
          </svg>
          Cofnij
        </button>

        <!-- Redo button -->
        <button
          id="btn-redo"
          disabled
          title="Ponów akcję (Ctrl+Y)"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-semibold
                 bg-gray-700 text-gray-500 border border-gray-600
                 transition-all duration-150 select-none cursor-not-allowed
                 enabled:cursor-pointer enabled:text-emerald-300 enabled:border-emerald-500/50
                 enabled:bg-emerald-900/40 enabled:hover:bg-emerald-800/60 enabled:hover:text-white
                 active:scale-95"
        >
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l6-6m0 0-6-6m6 6H9a6 6 0 0 0 0 12h3"/>
          </svg>
          Ponów
        </button>

        <!-- Shortcut hints -->
        <span class="text-gray-600 text-xs font-mono select-none">Ctrl+Z / Ctrl+Y</span>

        <div class="flex-1"></div>

        <!-- Flash message -->
        <span
          id="undo-toast"
          class="text-xs font-semibold opacity-0 transition-opacity duration-300 pointer-events-none"
        ></span>
      </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
        <!-- Character View Component -->
        <div id="character-view-container">
          <div class="text-center text-gray-500 mt-20 animate-pulse">Loading Character...</div>
        </div>
        
        <!-- Armor View Component -->
        <div id="armor-view-container">
          <div class="text-center text-gray-500 mt-20 animate-pulse">Loading Armor Config...</div>
        </div>
    </div>

    <!-- Economy View Component -->
    <div class="max-w-5xl mx-auto mt-8">
        <div id="economy-view-container">
          <div class="text-center text-gray-500 mt-10 animate-pulse">Loading Economy...</div>
        </div>
    </div>

    <!-- Inventory View Component -->
    <div class="max-w-7xl mx-auto mt-12">
        <div id="inventory-view-container">
          <div class="text-center text-gray-500 mt-20 animate-pulse">Loading Inventory...</div>
        </div>
    </div>

    <!-- Shop View Component -->
    <div class="max-w-7xl mx-auto mt-12">
        <div id="shop-view-container">
          <div class="text-center text-gray-500 mt-20 animate-pulse">Loading Shop...</div>
        </div>
    </div>

    <!-- Modals -->
    <div id="payment-modal-container"></div>
    <div id="item-editor-modal-container"></div>

    <!-- Main App Script -->
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
