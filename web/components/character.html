<div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700 relative overflow-hidden">
  <!-- Decorative background glow -->
  <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-600 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

  <input
    type="text"
    id="char-name"
    class="text-3xl font-extrabold text-center text-indigo-400 mb-1 bg-transparent border-b-2 border-transparent hover:border-indigo-500/50 focus:border-indigo-500 focus:outline-none w-full transition-colors"
    value="Loading..."
  />
  <p class="text-center text-gray-400 font-medium mb-8 tracking-wide">
    Level <span id="char-level">-</span>
  </p>

  <!-- Derived Stats Grid -->
  <div class="grid grid-cols-2 gap-4 mb-8 relative z-10">
    <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
      <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Health Points</p>
      <p class="text-2xl font-bold text-emerald-400" id="char-hp">-</p>
    </div>
    <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
      <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Defense</p>
      <p class="text-2xl font-bold text-blue-400" id="char-def">-</p>
    </div>
    <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
      <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Action Points</p>
      <p class="text-2xl font-bold text-amber-400" id="char-ap">-</p>
    </div>
    <div class="bg-gray-900/50 p-4 rounded-xl text-center border border-gray-700/50 shadow-inner">
      <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Stamina</p>
      <p class="text-2xl font-bold text-rose-400" id="char-stam">-</p>
    </div>
  </div>

  <!-- Base Stats -->
  <div class="relative z-10">
    <h2 class="text-lg font-bold text-gray-300 mb-4 uppercase tracking-widest border-b border-gray-700/50 pb-2">
      Base Stats
    </h2>
    <div class="space-y-3">
      <!-- STR -->
      <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
        <span class="text-gray-400 font-medium w-32">Strength (STR)</span>
        <div class="flex items-center space-x-3">
          <button data-action="modify-stat" data-stat="str" data-delta="-1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-rose-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">-</button>
          <span class="font-bold text-indigo-300 text-lg w-6 text-center" id="stat-str">-</span>
          <button data-action="modify-stat" data-stat="str" data-delta="1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-emerald-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">+</button>
        </div>
      </div>
      <!-- DEX -->
      <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
        <span class="text-gray-400 font-medium w-32">Dexterity (DEX)</span>
        <div class="flex items-center space-x-3">
          <button data-action="modify-stat" data-stat="dex" data-delta="-1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-rose-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">-</button>
          <span class="font-bold text-indigo-300 text-lg w-6 text-center" id="stat-dex">-</span>
          <button data-action="modify-stat" data-stat="dex" data-delta="1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-emerald-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">+</button>
        </div>
      </div>
      <!-- WIS -->
      <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
        <span class="text-gray-400 font-medium w-32">Wisdom (WIS)</span>
        <div class="flex items-center space-x-3">
          <button data-action="modify-stat" data-stat="wis" data-delta="-1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-rose-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">-</button>
          <span class="font-bold text-indigo-300 text-lg w-6 text-center" id="stat-wis">-</span>
          <button data-action="modify-stat" data-stat="wis" data-delta="1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-emerald-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">+</button>
        </div>
      </div>
      <!-- CHA -->
      <div class="flex justify-between items-center bg-gray-700/20 py-2 px-4 rounded-lg">
        <span class="text-gray-400 font-medium w-32">Charisma (CHA)</span>
        <div class="flex items-center space-x-3">
          <button data-action="modify-stat" data-stat="cha" data-delta="-1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-rose-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">-</button>
          <span class="font-bold text-indigo-300 text-lg w-6 text-center" id="stat-cha">-</span>
          <button data-action="modify-stat" data-stat="cha" data-delta="1" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-emerald-500/80 text-gray-300 flex items-center justify-center transition-colors font-bold">+</button>
        </div>
      </div>
    </div>
  </div>
</div>
