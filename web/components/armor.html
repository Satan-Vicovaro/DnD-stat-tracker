<div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700 relative overflow-hidden mt-6">
  <div class="absolute -top-10 -right-10 w-40 h-40 bg-fuchsia-600 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

  <h2 class="text-2xl font-extrabold text-fuchsia-400 mb-4 tracking-widest border-b border-gray-700/50 pb-2 flex justify-between items-end">
    ZBROJA
    <div class="text-right flex flex-col">
      <span class="text-xs font-medium text-gray-400 tracking-normal armor-total-fragments">0 fragments</span>
      <span class="text-[10px] font-bold text-rose-500 hidden armor-broken-fragments">0 zniszczonych!</span>
    </div>
  </h2>

  <!-- Armor Table -->
  <div class="space-y-3 mb-6 armor-list-container">
    <!-- Populated by JS -->
  </div>

  <!-- Capacity Progress Bar -->
  <div class="relative z-10 pt-2 border-t border-gray-700/50">
    <div class="flex justify-between text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">
      <span>Zużywane: <span class="text-fuchsia-300 armor-used-space">0</span></span>
      <span>Max: <span class="armor-max-space">24</span></span>
    </div>
    
    <div class="w-full bg-gray-900 rounded-full h-3 shadow-inner overflow-hidden flex border border-gray-700">
      <div class="h-3 transition-all duration-300 bg-emerald-500 armor-capacity-bar-intact" style="width: 0%"></div>
      <div class="h-3 transition-all duration-300 bg-rose-500 armor-capacity-bar-damaged" style="width: 0%"></div>
    </div>
    <div class="text-right text-xs mt-1 text-gray-500 font-medium flex justify-between items-end">
      <div class="flex gap-2 text-[10px] uppercase font-bold tracking-wider">
        <span class="text-emerald-500">■ Całe</span>
        <span class="text-rose-500">■ Zniszczone</span>
      </div>
      <div>Pozostałe: <span class="text-gray-300 armor-remaining-space">24</span></div>
    </div>
  </div>
</div>
