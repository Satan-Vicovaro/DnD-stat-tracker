<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start mb-8">

  <!-- Left Column: Damage & Health -->
  <div class="bg-gray-800 rounded-xl shadow-lg border border-gray-700 p-6 flex flex-col gap-6">
    <h3 class="text-xl font-bold text-white flex items-center gap-2">
      <span class="text-rose-500">⚔</span> Otrzymane Obrażenia
    </h3>

    <!-- Health Bars -->
    <div class="flex flex-col gap-4">
      <!-- Armor Health -->
      <div>
        <div class="flex justify-between items-end mb-1">
          <span class="text-sm font-bold text-gray-400">Pancerz (Odbiera rany fizyczne)</span>
          <span class="font-mono text-sm font-bold text-slate-400" id="fight-armor-hp-text">0 / 0</span>
        </div>
        <div class="w-full bg-gray-700/50 rounded-full h-3 overflow-hidden shadow-inner border border-gray-600/50">
          <div id="fight-armor-hp-bar" class="bg-slate-500 h-3 rounded-full transition-all duration-500" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Base Health -->
      <div>
        <div class="flex justify-between items-end mb-1">
          <span class="text-sm font-bold text-gray-400">Zdrowie Bohatera</span>
          <span class="font-mono text-sm font-bold text-emerald-400" id="fight-base-hp-text">0 / 0</span>
        </div>
        <div class="w-full bg-gray-700/50 rounded-full h-4 overflow-hidden shadow-inner border border-gray-600/50">
          <div id="fight-base-hp-bar" class="bg-emerald-500 h-4 rounded-full transition-all duration-500" style="width: 0%;"></div>
        </div>
      </div>
    </div>

    <hr class="border-gray-700">

    <div class="flex items-center justify-between bg-indigo-900/40 p-3 rounded-lg border border-indigo-500/50">
      <span class="text-sm font-bold text-indigo-300">Aktualna Redukcja Obrażeń Fizycznych:</span>
      <span class="text-xl font-black text-indigo-400" id="fight-mitigation-badge">0</span>
    </div>

    <!-- Damage Form -->
    <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700 flex flex-col gap-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Ilość obrażeń</label>
        <input type="number" id="fight-damage-amount" min="1" value="1" class="w-full bg-gray-800 text-white font-mono text-xl p-3 rounded-lg border-2 border-gray-700 focus:border-rose-500 focus:outline-none transition-colors">
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Typ obrażeń</label>
        <div class="grid grid-cols-2 gap-3">
          <label class="cursor-pointer relative">
            <input type="radio" name="fight_damage_type" value="physical" class="peer sr-only" checked>
            <div class="p-3 rounded-lg border-2 border-gray-700 bg-gray-800 text-center text-gray-400 font-bold transition-all peer-checked:border-orange-500 peer-checked:text-orange-400 peer-checked:bg-orange-900/20 hover:bg-gray-700">
              Fizyczne
            </div>
          </label>
          <label class="cursor-pointer relative">
            <input type="radio" name="fight_damage_type" value="magical" class="peer sr-only">
            <div class="p-3 rounded-lg border-2 border-gray-700 bg-gray-800 text-center text-gray-400 font-bold transition-all peer-checked:border-purple-500 peer-checked:text-purple-400 peer-checked:bg-purple-900/20 hover:bg-gray-700">
              Magiczne
            </div>
          </label>
        </div>
        <p class="text-[10px] text-gray-500 mt-2 italic">* Pancerz redukuje tylko obrażenia fizyczne.</p>
      </div>

      <button id="btn-apply-damage" class="mt-2 w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg shadow-[0_0_15px_rgba(225,29,72,0.4)] transition-all active:scale-95">
        Zadaj Obrażenia
      </button>
    </div>

  </div>

  <!-- Right Column: Equipped Items & Actions -->
  <div class="flex flex-col gap-6">
    <!-- Readonly Armor Component inside Fight Tab -->
    <div id="fight-armor-view-container" class="-mt-6"></div>

    <div class="bg-gray-800 rounded-xl shadow-lg border border-gray-700 p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="text-emerald-500">🛡</span> W Rękach (Equipped)
        </h3>
      </div>
      
      <!-- Equipped Items List -->
      <div id="fight-equipped-list" class="grid gap-3">
        <!-- Rendered by JS -->
      </div>
      <div id="fight-equipped-empty" class="text-center text-gray-500 py-6 italic hidden">
        Brak przedmiotów podręcznych.
      </div>
    </div>
  </div>

</div>
