<!-- Save/Load Modal Background Overlay -->
<div id="saveload-modal-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
  <!-- Modal Container -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <!-- Modal Content -->
    <div id="saveload-modal-content" class="bg-gray-800 border border-gray-700 shadow-2xl rounded-2xl w-full max-w-2xl flex flex-col max-h-[85vh] scale-95 transition-transform duration-300">
      
      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50 rounded-t-2xl">
        <h2 class="text-xl font-bold text-gray-100 flex items-center gap-2">
          <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          Wczytaj Grę
        </h2>
        <button id="saveload-modal-close" class="text-gray-400 hover:text-white transition-colors p-1 hover:bg-gray-700 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Body / List of Saves -->
      <div class="p-6 overflow-y-auto flex-1">
        <div id="saves-list" class="flex flex-col gap-3">
          <!-- Saves will be dynamically injected here -->
          <div class="text-center text-gray-500 py-8 animate-pulse">Ładowanie zapisów...</div>
        </div>
      </div>
      
    </div>
  </div>
</div>
